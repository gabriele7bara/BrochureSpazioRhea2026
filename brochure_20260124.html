<title>Spazio Rhea – Brochure Digitale (DEF2 – fix hotspot)</title>
<style>
:root { --overlay: rgba(0,0,0,.45); }
html, body{margin:0;padding:0;background:#fff;background:#EDDBCC;}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;}

.wrap{width:min(530px, 100%);margin:0 auto;position:relative;}
.layout-raster{width:100%;height:auto;display:block;}
.anchor{position:absolute;left:0;width:1px;height:1px;}

.hs{position:absolute;background:transparent;border:0;padding:0;cursor:pointer;text-decoration:none;-webkit-tap-highlight-color: transparent;}
.hs:focus{outline:2px solid rgba(0,0,0,.25); outline-offset:2px;}

.modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.98);
  width:min(560px, 92vw);max-height:80vh;overflow:auto;border-radius:22px;padding:26px 18px;
  box-shadow:0 24px 70px rgba(0,0,0,.28);opacity:0; pointer-events:none;
  transition:opacity .35s ease, transform .35s ease;z-index:101;text-align:center;}
.modal.active{opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1);}

.modal h3{letter-spacing:.18em;margin:0 0 8px;}
.modal h4{margin:0 0 18px;font-weight:400;font-size:.95rem;opacity:.75;}
.modal p{margin:0 0 14px; line-height:1.55;}
.modal .placeholder{opacity:.8;}
.close-hint{font-size:.82rem;opacity:.65;margin-top:10px;}
.bio-embed{width:100%;display:flex;justify-content:center;align-items:flex-start;}
.bio-embed img{width:100%;height:auto;display:block;max-width:520px;}
.bio-embed img{image-rendering:auto;}
/* Mobile QR/in-app browser fixes */
html, body{width:100%;height:100%;margin:0;padding:0;overflow-x:hidden;}
.wrap{width:100vw;max-width:none !important;}
.layout-raster{width:100vw !important;max-width:none !important;height:auto;display:block;}
/* Ensure hotspots align with full-width scaling */
.wrap{position:relative;}
/* Video: prefer contain to avoid cropping, but eliminate side gutters by matching background */
/* Some in-app browsers apply color adjustments; opt out where supported */
:root{color-scheme:light;}
/* Full-bleed look without white gutters */
body{background:#EDDBCC;}
.wrap{background:#EDDBCC;}
/* Use padding for safe areas on notched phones */
@supports(padding: max(0px)) {
  .wrap{padding-left:max(0px, env(safe-area-inset-left)); padding-right:max(0px, env(safe-area-inset-right));}
}
/* Center the content; gutters inherit background instead of white */
.layout-raster{background:#EDDBCC;}
/* Full-width FIT (no crop): the brochure always matches the screen left/right edges */
html, body{
  margin:0;
  padding:0;
  width:100%;
  overflow-x:hidden;
}
.wrap{
  position:relative;
  width:100vw !important;
  max-width:none !important;
  margin:0 !important;
  padding:0 !important;
}
#layoutRaster, .layout-raster{
  width:100vw !important;
  max-width:none !important;
  height:auto !important;
  display:block;
}
/* === Full-width layout override (keep hotspots aligned) === */
.wrap{
  position:relative;
  width:100vw !important;
  max-width:none !important;
  margin:0 !important;
  padding:0 !important;
}
#layoutRaster, .layout-raster{
  width:100vw !important;
  max-width:none !important;
  height:auto !important;
  display:block;
}

/* --- Sliced raster layout (Cloudflare/mobile reliable anchors) --- */
.flow{position:relative}
.page-img{width:100%;height:auto;display:block;pointer-events:none;user-select:none;-webkit-user-drag:none}
.anchor{height:1px;width:1px}

/* Ensure hotspot links stay tappable above images */
.hotspot, .hs-link, a.hotspot, a.hs-link{pointer-events:auto !important; z-index:9999 !important; touch-action:manipulation}

/* Hotspots always on top and clickable */
.hotspot, a.hotspot, .hs-link, a.hs-link{
  z-index:999999 !important;
  pointer-events:auto !important;
  touch-action:manipulation;
}
.wrap{pointer-events:auto !important;}

/* --- CSS-only modals (works even if JS blocked in QR viewers) --- */
.modal{opacity:0 !important; pointer-events:none !important;}
.modal:target{opacity:1 !important; pointer-events:auto !important; transform:translate(-50%,-50%) scale(1) !important;}
.modal-backdrop{
  position:fixed; inset:0; background:rgba(0,0,0,.42);
  z-index:-1; display:block;
}
.modal-card{position:relative;}
.modal-close{margin-top:14px;opacity:.85}
.modal-close a{text-decoration:none;color:inherit;border:1px solid rgba(0,0,0,.18);padding:10px 14px;border-radius:999px;display:inline-block}



/* Video (Respiro Sacro) */
.hotspot1-anim{
  position:absolute;
  z-index:20;
  left:27.0835%;
  top:5.5060%;
  width:45.8330%;
  height:10.7440%;
  background:transparent;
  overflow:visible;
  pointer-events:none;
}

  .respiro-svg{
  width:100%;
  height:100%;
  display:block;
  pointer-events:none !important;
}

/* Stato iniziale */
.symbol{
  transform-origin: 250px 250px;
  opacity:0;
  transform: scale(0.95);
}

.text{
  opacity:0;
  transform: translate(0,10px);
}

/* Animazione simbolo (respiro) */
.symbol{
  animation: respiroPulse 2.6s cubic-bezier(0.22, 0.61, 0.36, 1) 4.55s 1 forwards;
}

@keyframes respiroSymbol{
  0%{
    opacity:0;
    transform: scale(0.92);
  }
  40%{
    opacity:1;
  }
  70%{
    transform: scale(1.03);
  }
  100%{
    opacity:1;
    transform: scale(1);
  }
}

/* Animazione testo (dopo il picco) */
.text{
  animation: logoReveal 1.15s cubic-bezier(0.22, 0.61, 0.36, 1) 4.15s forwards;
}

@keyframes respiroText{
  from{
    opacity:0;
    transform: translate(0,10px);
  }
  to{
    opacity:1;
    transform: translate(0,0);
  }
}
  .hotspot1-anim{
  pointer-events: none !important;
}

.hotspot1-anim svg{
  pointer-events: none !important;
}
  .respiro-svg{
  width:100%;
  height:100%;
  display:block;
  pointer-events:none !important;
}

<script>
(function(){
  function getWrapTopAndHeight(){
    var wrap = document.querySelector('.wrap');
    if(!wrap) return null;
    var r = wrap.getBoundingClientRect();
    return { top: window.scrollY + r.top, height: r.height };
  }
  function scrollToPercent(p){
    var wh = getWrapTopAndHeight();
    if(!wh) return;
    window.scrollTo({ top: wh.top + wh.height * p, behavior: 'smooth' });
  }
  // Bind only the 3 shortcut buttons (hs-link)
  function bind(){
    document.querySelectorAll('a.hs-link').forEach(function(a){
      var t = (a.getAttribute('data-target') || '').toLowerCase();
      var p = null;
      if(t === 'p2') p = 0.25;
      if(t === 'p3') p = 0.50;
      if(t === 'p4') p = 0.75;
      if(p === null) return;

      function go(e){
        e.preventDefault();
        scrollToPercent(p);
      }
      a.addEventListener('touchend', go, {passive:false});
      a.addEventListener('click', go, true);
    });
  }
  window.addEventListener('load', bind);
  window.addEventListener('pageshow', bind);
})();
</script>
<script>
(function(){
  function playRespiro(){
    var v = document.getElementById('respiroVideo');
    if(!v) return;
    try{
      var p = v.play();
      if(p && p.catch) p.catch(function(){});
    }catch(e){}
  }
  function setup(){
    playRespiro();
    var once = function(){ playRespiro(); window.removeEventListener('touchstart', once); window.removeEventListener('click', once); };
    window.addEventListener('touchstart', once, {passive:true});
    window.addEventListener('click', once, {passive:true});
  }
  window.addEventListener('load', setup);
  window.addEventListener('pageshow', setup);
})();
</script>
<script>
(function(){
  // --- CTA shortcuts (hs-link only; BIO untouched) ---
  function getWrapTopAndHeight(){
    var wrap = document.querySelector('.wrap');
    if(!wrap) return null;
    var r = wrap.getBoundingClientRect();
    return { top: window.scrollY + r.top, height: r.height };
  }
  function scrollToPercent(p){
    var wh = getWrapTopAndHeight();
    if(!wh) return;
    window.scrollTo({ top: wh.top + wh.height * p, behavior: 'smooth' });
  }
  function bindShortcuts(){
    document.querySelectorAll('a.hs-link').forEach(function(a){
      var t = (a.getAttribute('data-target') || '').toLowerCase();
      var p = null;
      if(t === 'p2') p = 0.25;
      if(t === 'p3') p = 0.50;
      if(t === 'p4') p = 0.75;
      if(p === null) return;
      function go(e){ e.preventDefault(); scrollToPercent(p); }
      a.addEventListener('touchend', go, {passive:false});
      a.addEventListener('click', go, true);
    });
  }

  // --- Video robustness + matte hide + skip first frames ---
  var START_OFFSET = 0.08; // seconds: removes the few initial off-color frames
  function setupVideo(){
    var v = document.getElementById('respiroVideo');
    if(!v) return;
    var matte = document.querySelector('.hotspot1-anim .video-matte');

    function hideMatte(){
      if(matte) matte.style.opacity = '0';
    }

    v.addEventListener('loadedmetadata', function(){
      try{
        if(!isNaN(v.duration) && v.duration > START_OFFSET){
          v.currentTime = START_OFFSET;
        }
      }catch(e){}
    }, {once:true});

    v.addEventListener('playing', hideMatte, {once:true});
    v.addEventListener('canplay', function(){
      // If autoplay blocked, matte stays; first tap will start and then matte fades
    }, {once:true});

    function play(){
      try{
        var p = v.play();
        if(p && p.catch) p.catch(function(){});
      }catch(e){}
    }
    play();
    var once = function(){ play(); window.removeEventListener('touchstart', once); window.removeEventListener('click', once); };
    window.addEventListener('touchstart', once, {passive:true});
    window.addEventListener('click', once, {passive:true});
  }

  window.addEventListener('load', function(){
    bindShortcuts();
    setupVideo();
  });
  window.addEventListener('pageshow', function(){
    bindShortcuts();
    setupVideo();
  });
})();
</script>
<script>
(function(){
  function goTo(id){
    var el = document.getElementById(id);
    if(!el) return;
    try{ el.scrollIntoView({behavior:'smooth', block:'start'}); }
    catch(e){ el.scrollIntoView(true); }
  }
  function bind(selector){
    document.querySelectorAll(selector).forEach(function(a){
      function go(e){
        var href = (a.getAttribute('href')||'').trim();
        if(href && href.charAt(0)==='#'){
          e.preventDefault();
          goTo(href.slice(1));
        }
      }
      a.addEventListener('click', go, true);
      a.addEventListener('touchend', go, {passive:false});
    });
  }
  window.addEventListener('load', function(){
    bind('a.footer-cta');
    bind('a.hs-link');
  });
  window.addEventListener('pageshow', function(){
    bind('a.footer-cta');
    bind('a.hs-link');
  });
})();
</script>
